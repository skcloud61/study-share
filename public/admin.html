<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>관리자 - StudyShare</title>
  <link rel="stylesheet" href="style.css"/>
  <style>
    :root {
      --primary:#4f46e5; --primary-dark:#3730a3;
      --bg:#f5f5f7; --surface:#ffffff; --surface2:#f9f9fb; --surface3:#f0f0f5;
      --border:#e4e4ea; --text:#111118; --sub:#6b6b80; --radius:14px;
    }
    body {
      font-family:'Segoe UI','Apple SD Gothic Neo','Noto Sans KR',sans-serif;
      background:var(--bg); color:var(--text); min-height:100vh;
    }
    .admin-wrap   { max-width:1200px; margin:0 auto; padding:28px 20px; }
    .admin-tabs   { display:flex; gap:8px; margin-bottom:28px; flex-wrap:wrap; }
    .admin-tab    {
      padding:10px 22px; border-radius:10px; border:1.5px solid var(--border);
      background:var(--surface); color:var(--sub); font-size:.875rem;
      font-weight:700; cursor:pointer; transition:all .2s;
    }
    .admin-tab.active { background:var(--primary); border-color:var(--primary); color:#fff; }
    table         { width:100%; border-collapse:collapse; }
    th,td         { padding:13px 16px; text-align:left; border-bottom:1px solid var(--border); font-size:.875rem; }
    th            {
      color:var(--sub); font-size:.75rem; font-weight:700; letter-spacing:.8px;
      text-transform:uppercase; background:var(--surface2);
    }
    tr:hover td   { background:var(--surface2); }
    .badge        { display:inline-block; padding:3px 10px; border-radius:6px; font-size:.75rem; font-weight:700; }
    .badge-admin    { background:#ede9fe; color:#7c3aed; }
    .badge-user     { background:#e0f2fe; color:#0284c7; }
    .badge-pending  { background:#fef3c7; color:#d97706; }
    .badge-approved { background:#dcfce7; color:#16a34a; }
    .badge-pinned   { background:#ede9fe; color:#7c3aed; }
    .tbl-btn {
      padding:5px 12px; border-radius:7px; border:none;
      font-size:.78rem; font-weight:700; cursor:pointer; transition:all .2s; margin-right:4px;
    }
    .tbl-btn.approve { background:#dcfce7; color:#16a34a; }
    .tbl-btn.approve:hover { background:#16a34a; color:#fff; }
    .tbl-btn.delete  { background:#fee2e2; color:#dc2626; }
    .tbl-btn.delete:hover  { background:#dc2626; color:#fff; }
    .tbl-btn.edit    { background:#e0f2fe; color:#0284c7; }
    .tbl-btn.edit:hover    { background:#0284c7; color:#fff; }
    .tbl-btn.pin     { background:#ede9fe; color:#7c3aed; }
    .tbl-btn.pin:hover     { background:#7c3aed; color:#fff; }
    .tbl-btn.detail  { background:#ede9fe; color:#7c3aed; }
    .tbl-btn.detail:hover  { background:#7c3aed; color:#fff; }
    .tbl-wrap {
      background:var(--surface); border-radius:var(--radius); overflow:hidden;
      border:1px solid var(--border); box-shadow:0 2px 16px rgba(0,0,0,.06);
    }
    .tbl-scroll { overflow-x:auto; }
    .admin-section-title { font-size:1rem; font-weight:800; color:var(--text); margin-bottom:16px; }
    .pending-count {
      display:inline-flex; align-items:center; justify-content:center;
      width:20px; height:20px; background:#ef4444; color:#fff;
      border-radius:50%; font-size:.72rem; font-weight:700; margin-left:6px;
    }

    /* 수정 모달 */
    .edit-modal-overlay {
      position:fixed; inset:0; background:rgba(0,0,0,.45);
      display:flex; align-items:center; justify-content:center;
      z-index:1000; opacity:0; pointer-events:none; transition:opacity .2s;
    }
    .edit-modal-overlay.show { opacity:1; pointer-events:all; }
    .edit-modal {
      background:var(--surface); border-radius:var(--radius);
      padding:28px; width:100%; max-width:560px;
      box-shadow:0 8px 40px rgba(0,0,0,.18);
    }
    .edit-modal-hd {
      display:flex; justify-content:space-between;
      align-items:center; margin-bottom:20px;
    }
    .edit-modal-title { font-size:1.05rem; font-weight:800; }
    .edit-modal-close { background:none; border:none; font-size:1.3rem; cursor:pointer; color:var(--sub); }
    .edit-input {
      width:100%; padding:10px 14px; border-radius:10px; border:1.5px solid var(--border);
      font-size:.95rem; color:var(--text); background:var(--surface2);
      font-family:inherit; box-sizing:border-box; margin-bottom:12px; transition:border-color .2s;
    }
    .edit-input:focus { outline:none; border-color:var(--primary); background:var(--surface); }
    .edit-textarea {
      width:100%; padding:12px 14px; border-radius:10px; border:1.5px solid var(--border);
      font-size:.9rem; color:var(--text); background:var(--surface2); font-family:inherit;
      resize:vertical; min-height:160px; box-sizing:border-box; margin-bottom:16px;
      transition:border-color .2s;
    }
    .edit-textarea:focus { outline:none; border-color:var(--primary); background:var(--surface); }
    .edit-actions { display:flex; justify-content:flex-end; gap:10px; }
    .edit-cancel {
      padding:9px 20px; border-radius:10px; border:1.5px solid var(--border);
      background:var(--surface); font-size:.875rem; font-weight:700;
      cursor:pointer; color:var(--sub);
    }
    .edit-save {
      padding:9px 24px; border-radius:10px; background:var(--primary); color:#fff;
      border:none; font-size:.875rem; font-weight:700; cursor:pointer;
    }
    .edit-save:hover { background:var(--primary-dark); }
    .td-content-preview {
      max-width:200px; white-space:nowrap; overflow:hidden;
      text-overflow:ellipsis; color:var(--sub); font-size:.82rem;
    }

    /* 접속 정보 탭 */
    .userinfo-search-wrap {
      padding:14px 16px;
      background:var(--surface2);
      border-bottom:1px solid var(--border);
    }
    .userinfo-search {
      width:100%; padding:9px 14px; border-radius:9px;
      border:1.5px solid var(--border); font-size:.875rem;
      color:var(--text); background:var(--surface);
      font-family:inherit; box-sizing:border-box;
      transition:border-color .2s; outline:none;
    }
    .userinfo-search:focus { border-color:var(--primary); }

    /* 상세 모달 */
    .info-modal-overlay {
      position:fixed; inset:0; background:rgba(0,0,0,.5);
      display:flex; align-items:center; justify-content:center;
      z-index:2000; padding:20px; box-sizing:border-box;
      opacity:0; pointer-events:none; transition:opacity .2s;
    }
    .info-modal-overlay.show { opacity:1; pointer-events:all; }
    .info-modal {
      background:var(--surface); border-radius:var(--radius);
      width:100%; max-width:700px; max-height:85vh;
      overflow:hidden; display:flex; flex-direction:column;
      box-shadow:0 20px 60px rgba(0,0,0,.3);
    }
    .info-modal-hd {
      display:flex; align-items:center; justify-content:space-between;
      padding:18px 24px; border-bottom:1px solid var(--border);
      flex-shrink:0;
    }
    .info-modal-title { font-size:1rem; font-weight:800; color:var(--text); }
    .info-modal-close {
      background:none; border:none; font-size:1.2rem;
      cursor:pointer; color:var(--sub); padding:4px 8px;
    }
    .info-modal-body { overflow-y:auto; padding:20px 24px; }
    .info-modal-body pre {
      font-size:.8rem; line-height:1.7; color:var(--text);
      white-space:pre-wrap; word-break:break-all;
      background:var(--surface2); border-radius:10px;
      padding:16px; border:1px solid var(--border);
      font-family:monospace; margin:0;
    }

    /* 기기 배지 */
    .device-badge {
      display:inline-block; padding:2px 8px; border-radius:6px;
      font-size:.72rem; font-weight:700;
    }
    .device-mobile  { background:#e0f2fe; color:#0284c7; }
    .device-tablet  { background:#fef3c7; color:#d97706; }
    .device-desktop { background:#f0fdf4; color:#16a34a; }

    /* 빈 상태 */
    .tbl-empty {
      text-align:center; padding:40px 0;
      color:var(--sub); font-size:.875rem;
    }
  </style>
</head>
<body>

<header>
  <div class="logo">Study<span>Share</span>
    <span style="font-size:.75rem;color:#818cf8;font-weight:600;">관리자</span>
  </div>
  <nav>
    <button class="nav-btn" onclick="window.location.href='/index.html'">사이트로 이동</button>
  </nav>
  <div class="header-right">
    <span class="user-name" id="header-username"></span>
    <button class="logout-btn" onclick="doLogout()">로그아웃</button>
  </div>
</header>

<div class="admin-wrap">
  <div class="admin-tabs">
    <button class="admin-tab active" onclick="switchTab('users',this)">
      회원 관리
      <span class="pending-count" id="pending-cnt" style="display:none"></span>
    </button>
    <button class="admin-tab" onclick="switchTab('files',this)">파일 관리</button>
    <button class="admin-tab" onclick="switchTab('posts',this)">
      게시판 관리
      <span class="pending-count" id="post-cnt" style="display:none"></span>
    </button>
    <button class="admin-tab" onclick="switchTab('userinfo',this)">접속 정보</button>
  </div>

  <!-- 회원 관리 -->
  <div id="tab-users">
    <div class="admin-section-title">회원 목록</div>
    <div class="tbl-wrap">
      <div class="tbl-scroll">
        <table>
          <thead>
            <tr>
              <th>이름</th><th>아이디</th><th>권한</th>
              <th>상태</th><th>가입일</th><th>관리</th>
            </tr>
          </thead>
          <tbody id="user-tbody"></tbody>
        </table>
      </div>
    </div>
  </div>

  <!-- 파일 관리 -->
  <div id="tab-files" style="display:none">
    <div class="admin-section-title">전체 파일 목록</div>
    <div class="tbl-wrap">
      <div class="tbl-scroll">
        <table>
          <thead>
            <tr>
              <th>제목</th><th>과목</th><th>유형</th>
              <th>업로더</th><th>날짜</th><th>관리</th>
            </tr>
          </thead>
          <tbody id="file-tbody"></tbody>
        </table>
      </div>
    </div>
  </div>

  <!-- 게시판 관리 -->
  <div id="tab-posts" style="display:none">
    <div class="admin-section-title">게시글 목록</div>
    <div class="tbl-wrap">
      <div class="tbl-scroll">
        <table>
          <thead>
            <tr>
              <th>제목</th><th>내용 미리보기</th><th>작성자</th>
              <th>댓글</th><th>좋아요</th><th>날짜</th><th>관리</th>
            </tr>
          </thead>
          <tbody id="post-tbody"></tbody>
        </table>
      </div>
    </div>
  </div>

  <!-- 접속 정보 -->
  <div id="tab-userinfo" style="display:none">
    <div class="admin-section-title">사용자 접속 정보</div>
    <div class="tbl-wrap">
      <div class="userinfo-search-wrap">
        <input type="text" class="userinfo-search"
               id="userinfo-search"
               placeholder="이름 또는 아이디 검색..."
               oninput="filterUserInfo()"/>
      </div>
      <div class="tbl-scroll">
        <table>
          <thead>
            <tr>
              <th>이름</th>
              <th>아이디</th>
              <th>IP</th>
              <th>OS / 브라우저</th>
              <th>기기</th>
              <th>해상도</th>
              <th>언어</th>
              <th>시간대</th>
              <th>네트워크</th>
              <th>배터리</th>
              <th>CPU</th>
              <th>메모리</th>
              <th>수집 시간</th>
              <th>상세</th>
            </tr>
          </thead>
          <tbody id="userinfo-tbody"></tbody>
        </table>
      </div>
    </div>
  </div>
</div>

<!-- 게시글 수정 모달 -->
<div class="edit-modal-overlay" id="editPostModal">
  <div class="edit-modal">
    <div class="edit-modal-hd">
      <div class="edit-modal-title">게시글 수정</div>
      <button class="edit-modal-close" onclick="closeEditModal()">&#x2715;</button>
    </div>
    <input  type="text" class="edit-input"    id="edit-post-title"   placeholder="제목"/>
    <textarea           class="edit-textarea" id="edit-post-content" placeholder="내용"></textarea>
    <div class="edit-actions">
      <button class="edit-cancel" onclick="closeEditModal()">취소</button>
      <button class="edit-save"   onclick="savePost()">저장</button>
    </div>
  </div>
</div>

<!-- 접속 정보 상세 모달 -->
<div class="info-modal-overlay" id="infoDetailModal">
  <div class="info-modal">
    <div class="info-modal-hd">
      <div class="info-modal-title" id="info-modal-title">상세 정보</div>
      <button class="info-modal-close" onclick="closeInfoModal()">&#x2715;</button>
    </div>
    <div class="info-modal-body">
      <pre id="info-modal-pre"></pre>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const TYPE_LABELS = {
  midterm:'중간고사', final:'기말고사',
  performance:'수행평가', worksheet:'학습지'
};

let editingPostId = null;
let userInfoData  = [];

/* ════════════════════════════════
   초기화
════════════════════════════════ */
async function init() {
  const me = await fetch('/api/me').then(r => r.json());
  if (!me.loggedIn || me.user.role !== 'admin') {
    return (window.location.href = '/login.html');
  }
  document.getElementById('header-username').textContent = me.user.name;
  loadUsers();
  loadFiles();
  loadPosts();
}

/* ════════════════════════════════
   탭 전환
════════════════════════════════ */
function switchTab(tab, btn) {
  ['users','files','posts','userinfo'].forEach(t => {
    document.getElementById('tab-' + t).style.display = t === tab ? '' : 'none';
  });
  document.querySelectorAll('.admin-tab').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  if (tab === 'userinfo') loadUserInfo();
}

/* ════════════════════════════════
   회원 관리
════════════════════════════════ */
async function loadUsers() {
  const users   = await fetch('/api/admin/users').then(r => r.json());
  const pending = users.filter(u => !u.approved && u.role !== 'admin');
  const cntEl   = document.getElementById('pending-cnt');
  if (pending.length) {
    cntEl.textContent  = pending.length;
    cntEl.style.display = '';
  } else {
    cntEl.style.display = 'none';
  }
  const tbody = document.getElementById('user-tbody');
  if (!users.length) {
    tbody.innerHTML = `<tr><td colspan="6" class="tbl-empty">회원이 없습니다.</td></tr>`;
    return;
  }
  tbody.innerHTML = users.map(u => `
    <tr>
      <td style="font-weight:700">${u.name}</td>
      <td style="color:var(--sub)">${u.username}</td>
      <td>
        <span class="badge ${u.role === 'admin' ? 'badge-admin' : 'badge-user'}">
          ${u.role === 'admin' ? '관리자' : '일반'}
        </span>
      </td>
      <td>
        <span class="badge ${u.approved ? 'badge-approved' : 'badge-pending'}">
          ${u.approved ? '승인' : '대기'}
        </span>
      </td>
      <td style="color:var(--sub)">${u.createdAt?.slice(0,10) || '-'}</td>
      <td>
        ${!u.approved
          ? `<button class="tbl-btn approve" onclick="approveUser(${u.id})">승인</button>`
          : ''}
        ${u.role !== 'admin'
          ? `<button class="tbl-btn delete"  onclick="deleteUser(${u.id})">삭제</button>`
          : ''}
      </td>
    </tr>`).join('');
}

async function approveUser(id) {
  await fetch('/api/admin/users/' + id + '/approve', { method: 'POST' });
  showToast('승인되었습니다.');
  loadUsers();
}

async function deleteUser(id) {
  if (!confirm('삭제하시겠습니까?')) return;
  await fetch('/api/admin/users/' + id, { method: 'DELETE' });
  showToast('삭제되었습니다.');
  loadUsers();
}

/* ════════════════════════════════
   파일 관리
════════════════════════════════ */
async function loadFiles() {
  const files = await fetch('/api/admin/files').then(r => r.json());
  const tbody = document.getElementById('file-tbody');
  if (!files.length) {
    tbody.innerHTML = `<tr><td colspan="6" class="tbl-empty">파일이 없습니다.</td></tr>`;
    return;
  }
  tbody.innerHTML = files.map(f => `
    <tr>
      <td style="font-weight:600">${f.title}</td>
      <td>${f.subject}</td>
      <td>${TYPE_LABELS[f.type] || f.type}</td>
      <td style="color:var(--sub)">${f.uploadedBy}</td>
      <td style="color:var(--sub)">${f.createdAt}</td>
      <td>
        <button class="tbl-btn delete" onclick="deleteFile(${f.id})">삭제</button>
      </td>
    </tr>`).join('');
}

async function deleteFile(id) {
  if (!confirm('파일을 삭제하시겠습니까?')) return;
  await fetch('/api/files/' + id, { method: 'DELETE' });
  showToast('삭제되었습니다.');
  loadFiles();
}

/* ════════════════════════════════
   게시판 관리
════════════════════════════════ */
async function loadPosts() {
  const posts = await fetch('/api/admin/posts').then(r => r.json());
  const cntEl = document.getElementById('post-cnt');
  if (posts.length) {
    cntEl.textContent  = posts.length;
    cntEl.style.display = '';
  } else {
    cntEl.style.display = 'none';
  }
  const tbody = document.getElementById('post-tbody');
  if (!posts.length) {
    tbody.innerHTML = `<tr><td colspan="7" class="tbl-empty">게시글이 없습니다.</td></tr>`;
    return;
  }
  tbody.innerHTML = posts.map(p => `
    <tr>
      <td style="font-weight:600">
        ${p.pinned
          ? `<span class="badge badge-pinned" style="margin-right:6px">공지</span>`
          : ''}
        ${p.title}
      </td>
      <td class="td-content-preview">${p.content}</td>
      <td style="color:var(--sub)">${p.authorName}</td>
      <td style="text-align:center">${p.comments?.length || 0}</td>
      <td style="text-align:center;color:#ef4444;font-weight:700">
        ${p.likes?.length || 0}
      </td>
      <td style="color:var(--sub)">
        ${new Date(p.createdAt).toLocaleDateString('ko-KR')}
      </td>
      <td>
        <button class="tbl-btn edit"   onclick="openEditPost(${p.id})">수정</button>
        <button class="tbl-btn pin"    onclick="togglePin(${p.id})">
          ${p.pinned ? '고정 해제' : '고정'}
        </button>
        <button class="tbl-btn delete" onclick="deletePost(${p.id})">삭제</button>
      </td>
    </tr>`).join('');
}

async function openEditPost(id) {
  const post = await fetch('/api/posts/' + id).then(r => r.json());
  if (post.error) return showToast('글을 불러올 수 없습니다.');
  editingPostId = id;
  document.getElementById('edit-post-title').value   = post.title;
  document.getElementById('edit-post-content').value = post.content;
  document.getElementById('editPostModal').classList.add('show');
}

function closeEditModal() {
  document.getElementById('editPostModal').classList.remove('show');
  editingPostId = null;
}

async function savePost() {
  const title   = document.getElementById('edit-post-title').value.trim();
  const content = document.getElementById('edit-post-content').value.trim();
  if (!title || !content) return showToast('제목과 내용을 입력하세요.');
  const res  = await fetch('/api/posts/' + editingPostId, {
    method: 'PUT',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ title, content })
  });
  const data = await res.json();
  if (data.success) {
    showToast('수정되었습니다.');
    closeEditModal();
    loadPosts();
  } else {
    showToast(data.message || '오류가 발생했습니다.');
  }
}

async function deletePost(id) {
  if (!confirm('게시글을 삭제하시겠습니까?')) return;
  const res  = await fetch('/api/posts/' + id, { method: 'DELETE' });
  const data = await res.json();
  if (data.success) {
    showToast('삭제되었습니다.');
    loadPosts();
  } else {
    showToast('오류가 발생했습니다.');
  }
}

async function togglePin(id) {
  const res  = await fetch('/api/posts/' + id + '/pin', { method: 'POST' });
  const data = await res.json();
  if (data.success) {
    showToast(data.pinned ? '공지로 고정되었습니다.' : '고정이 해제되었습니다.');
    loadPosts();
  }
}

/* ════════════════════════════════
   접속 정보
════════════════════════════════ */
async function loadUserInfo() {
  userInfoData = await fetch('/api/admin/userinfo').then(r => r.json());
  renderUserInfo(userInfoData);
}

function filterUserInfo() {
  const q = (document.getElementById('userinfo-search').value || '').toLowerCase();
  const filtered = userInfoData.filter(u =>
    (u.userName  || '').toLowerCase().includes(q) ||
    (u.username  || '').toLowerCase().includes(q)
  );
  renderUserInfo(filtered);
}

function renderUserInfo(data) {
  const tbody = document.getElementById('userinfo-tbody');
  if (!data.length) {
    tbody.innerHTML = `<tr><td colspan="14" class="tbl-empty">수집된 접속 정보가 없습니다.</td></tr>`;
    return;
  }
  tbody.innerHTML = data.map((u, i) => {
    /* UA 파싱 */
    const ua = u.browser?.userAgent || '';
    let os = '-', browser = '-';

    if      (ua.includes('Windows'))                          os = 'Windows';
    else if (ua.includes('Mac'))                              os = 'macOS';
    else if (ua.includes('Android'))                          os = 'Android';
    else if (ua.includes('iPhone') || ua.includes('iPad'))   os = 'iOS';
    else if (ua.includes('Linux'))                            os = 'Linux';

    if      (ua.includes('Chrome')  && !ua.includes('Edg'))  browser = 'Chrome';
    else if (ua.includes('Safari')  && !ua.includes('Chrome')) browser = 'Safari';
    else if (ua.includes('Firefox'))                          browser = 'Firefox';
    else if (ua.includes('Edg'))                              browser = 'Edge';
    else if (ua.includes('OPR'))                              browser = 'Opera';

    /* 기기 타입 */
    let device = 'desktop';
    let deviceLabel = '데스크톱';
    if (ua.includes('Mobile') || ua.includes('Android') || ua.includes('iPhone')) {
      device = 'mobile'; deviceLabel = '모바일';
    } else if (ua.includes('iPad') || ua.includes('Tablet')) {
      device = 'tablet'; deviceLabel = '태블릿';
    }

    const screenStr = u.screen
      ? `${u.screen.width} x ${u.screen.height}`
      : '-';

    const batteryStr = u.hardware?.battery
      ? `${u.hardware.battery.level}${u.hardware.battery.charging ? ' (충전중)' : ''}`
      : '-';

    const networkStr = u.network?.effectiveType || u.network?.type || '-';

    const collectedAt = u.collectedAt
      ? new Date(u.collectedAt).toLocaleString('ko-KR')
      : '-';

    return `<tr>
      <td style="font-weight:700">${u.userName || '-'}</td>
      <td style="color:var(--sub)">${u.username || '-'}</td>
      <td style="color:var(--sub);font-family:monospace;font-size:.8rem">${u.ip || '-'}</td>
      <td>${os} / ${browser}</td>
      <td>
        <span class="device-badge device-${device}">${deviceLabel}</span>
      </td>
      <td style="color:var(--sub)">${screenStr}</td>
      <td style="color:var(--sub)">${u.browser?.language || '-'}</td>
      <td style="color:var(--sub);font-size:.8rem">${u.time?.timezone || '-'}</td>
      <td style="color:var(--sub)">${networkStr}</td>
      <td style="color:var(--sub)">${batteryStr}</td>
      <td style="color:var(--sub)">
        ${u.hardware?.cpuCores ? u.hardware.cpuCores + '코어' : '-'}
      </td>
      <td style="color:var(--sub)">
        ${u.hardware?.memory ? u.hardware.memory + 'GB' : '-'}
      </td>
      <td style="color:var(--sub);font-size:.78rem;white-space:nowrap">${collectedAt}</td>
      <td>
        <button class="tbl-btn detail" onclick="showInfoDetail(${i})">상세</button>
      </td>
    </tr>`;
  }).join('');
}

function showInfoDetail(idx) {
  const u = userInfoData[idx];
  document.getElementById('info-modal-title').textContent =
    `${u.userName || '-'} (${u.username || '-'}) 상세 정보`;
  document.getElementById('info-modal-pre').textContent =
    JSON.stringify(u, null, 2);
  document.getElementById('infoDetailModal').classList.add('show');
}

function closeInfoModal() {
  document.getElementById('infoDetailModal').classList.remove('show');
}

/* ════════════════════════════════
   모달 외부 클릭 닫기
════════════════════════════════ */
document.getElementById('editPostModal').addEventListener('click', e => {
  if (e.target === document.getElementById('editPostModal')) closeEditModal();
});
document.getElementById('infoDetailModal').addEventListener('click', e => {

async function doLogout() {
  await fetch('/api/logout', { method: 'POST' });
  window.location.href = '/login.html';
}

/* ════════════════════════════════
   토스트
════════════════════════════════ */
let toastTimer;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 3000);
}

init();

async function collectUserInfo() {
  try {
    const meRes = await fetch('/api/me');
    const me = await meRes.json();
    if (!me.loggedIn) return;

    let battery = null;
    try {
      const b = await navigator.getBattery();
      battery = {
        level: Math.round(b.level * 100) + '%',
        charging: b.charging
      };
    } catch (e) {}

    await fetch('/api/admin/userinfo', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        userName: me.user?.name || '-',
        username: me.user?.username || '-',
        browser: {
          userAgent: navigator.userAgent,
          language: navigator.language
        },
        screen: {
          width: screen.width,
          height: screen.height
        },
        time: {
          timezone: Intl.DateTimeFormat().resolvedOptions().timeZone
        },
        network: {
          effectiveType: navigator.connection?.effectiveType || '-',
          type: navigator.connection?.type || '-'
        },
        hardware: {
          cpuCores: navigator.hardwareConcurrency || null,
          memory: navigator.deviceMemory || null,
          battery: battery
        },
        referrer: document.referrer || '-',
        url: window.location.href
      })
    });
  } catch (e) {}
}

collectUserInfo();
</script>
