<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>StudyShare</title>
  <link rel="stylesheet" href="style.css"/>
  <style>
    .board-page-wrap {
      max-width: 960px;
      margin: 0 auto;
      padding: 40px 24px;
    }
    .board-header {
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      margin-bottom: 24px;
      gap: 12px;
    }
    .board-header-left {}
    .board-header-title {
      font-size: 1.5rem;
      font-weight: 800;
      color: var(--text);
      letter-spacing: -.5px;
    }
    .board-header-sub {
      font-size: .82rem;
      color: var(--text-sub);
      margin-top: 4px;
    }
    .board-stats-row {
      display: flex;
      gap: 12px;
      margin-top: 4px;
      flex-wrap: wrap;
    }
    .board-stat {
      display: flex;
      flex-direction: column;
      align-items: center;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 12px 22px;
      min-width: 80px;
    }
    .board-stat-num {
      font-size: 1.25rem;
      font-weight: 800;
      color: #6366f1;
    }
    .board-stat-lbl {
      font-size: .72rem;
      color: var(--text-sub);
      margin-top: 2px;
      font-weight: 600;
    }
    .write-btn {
      padding: 11px 26px;
      background: #6366f1;
      color: #fff;
      border: none;
      border-radius: 12px;
      font-size: .9rem;
      font-weight: 700;
      cursor: pointer;
      transition: background .2s, transform .15s;
      white-space: nowrap;
      letter-spacing: -.2px;
      align-self: flex-start;
    }
    .write-btn:hover { background: #4f46e5; transform: translateY(-1px); }
    .board-search-row {
      display: flex;
      gap: 10px;
      margin-bottom: 18px;
    }
    .board-search-wrap {
      flex: 1;
      position: relative;
    }
    .board-search-wrap svg {
      position: absolute;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      width: 16px;
      height: 16px;
      color: var(--text-sub);
    }
    .board-search-input {
      width: 100%;
      padding: 10px 14px 10px 40px;
      border-radius: 10px;
      border: 1.5px solid var(--border);
      font-size: .875rem;
      background: var(--surface);
      color: var(--text);
      font-family: inherit;
      box-sizing: border-box;
      transition: border-color .2s;
    }
    .board-search-input:focus {
      outline: none;
      border-color: #6366f1;
    }
    .post-table-wrap {
      background: var(--surface);
      border-radius: 16px;
      border: 1px solid var(--border);
      overflow: hidden;
      box-shadow: 0 4px 24px rgba(80,70,200,.07);
    }
    .post-table-head {
      display: grid;
      grid-template-columns: 56px 1fr 90px 72px 60px 60px;
      padding: 0 20px;
      background: var(--surface2);
      border-bottom: 1.5px solid var(--border);
    }
    .post-table-head span {
      padding: 13px 0;
      font-size: .72rem;
      font-weight: 700;
      color: var(--text-sub);
      text-transform: uppercase;
      letter-spacing: .8px;
    }
    .post-table-head span:not(:first-child) { text-align: center; }
    .post-table-head span:nth-child(2)      { text-align: left; }
    .post-row {
      display: grid;
      grid-template-columns: 56px 1fr 90px 72px 60px 60px;
      padding: 0 20px;
      border-bottom: 1px solid var(--border);
      cursor: pointer;
      transition: background .13s;
      align-items: center;
    }
    .post-row:last-child  { border-bottom: none; }
    .post-row:hover       { background: #f5f4ff; }
    .post-row > *         { padding: 14px 0; }
    .post-row-num {
      font-size: .8rem;
      color: var(--text-sub);
      font-weight: 600;
    }
    .post-row-pin-label {
      display: inline-block;
      background: #ede9fe;
      color: #7c3aed;
      font-size: .7rem;
      font-weight: 800;
      padding: 2px 9px;
      border-radius: 6px;
      letter-spacing: .3px;
    }
    .post-row-title-wrap {
      display: flex;
      align-items: center;
      gap: 8px;
      min-width: 0;
    }
    .post-row-title {
      font-size: .925rem;
      font-weight: 600;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .post-row-comment-cnt {
      font-size: .78rem;
      color: #6366f1;
      font-weight: 700;
      white-space: nowrap;
      flex-shrink: 0;
    }
    .post-row-author {
      font-size: .82rem;
      color: var(--text-sub);
      text-align: center;
    }
    .post-row-date {
      font-size: .8rem;
      color: var(--text-sub);
      text-align: center;
    }
    .post-row-likes {
      font-size: .82rem;
      color: #ef4444;
      font-weight: 700;
      text-align: center;
    }
    .post-row-views {
      font-size: .8rem;
      color: var(--text-sub);
      text-align: center;
    }
    .post-empty {
      padding: 60px 0;
      text-align: center;
      color: var(--text-sub);
      font-size: .9rem;
    }
    .post-empty strong {
      display: block;
      font-size: 1rem;
      color: var(--text);
      margin-bottom: 6px;
    }
    .post-detail-page {
      max-width: 960px;
      margin: 0 auto;
      padding: 36px 24px;
    }
    .detail-back-btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 8px 16px;
      border-radius: 10px;
      border: 1.5px solid var(--border);
      background: var(--surface);
      font-size: .85rem;
      font-weight: 700;
      cursor: pointer;
      color: var(--text-sub);
      transition: all .18s;
      margin-bottom: 28px;
    }
    .detail-back-btn:hover { border-color: #6366f1; color: #6366f1; }
    .detail-back-btn svg   { width: 15px; height: 15px; }
    .detail-hero {
      background: linear-gradient(135deg, #6366f1 0%, #818cf8 100%);
      border-radius: 18px;
      padding: 36px 40px;
      margin-bottom: 24px;
      position: relative;
      overflow: hidden;
    }
    .detail-hero::after {
      content: '';
      position: absolute;
      right: -40px;
      top: -40px;
      width: 200px;
      height: 200px;
      border-radius: 50%;
      background: rgba(255,255,255,.08);
    }
    .detail-pin-badge {
      display: inline-block;
      background: rgba(255,255,255,.2);
      color: #fff;
      font-size: .72rem;
      font-weight: 800;
      padding: 3px 11px;
      border-radius: 7px;
      margin-bottom: 12px;
      letter-spacing: .5px;
    }
    .detail-hero-title {
      font-size: 1.6rem;
      font-weight: 800;
      color: #fff;
      margin-bottom: 14px;
      line-height: 1.35;
      position: relative;
    }
    .detail-hero-meta {
      display: flex;
      align-items: center;
      gap: 16px;
      flex-wrap: wrap;
      position: relative;
    }
    .detail-meta-chip {
      display: flex;
      align-items: center;
      gap: 5px;
      background: rgba(255,255,255,.15);
      color: rgba(255,255,255,.9);
      font-size: .8rem;
      font-weight: 600;
      padding: 5px 12px;
      border-radius: 8px;
    }
    .detail-meta-chip svg { width: 13px; height: 13px; opacity: .8; }
    .detail-edited { font-size: .75rem; color: rgba(255,255,255,.6); }
    .detail-layout {
      display: grid;
      grid-template-columns: 1fr 200px;
      gap: 20px;
      align-items: start;
    }
    .detail-body-card {
      background: var(--surface);
      border-radius: 16px;
      border: 1px solid var(--border);
      padding: 32px;
      font-size: .95rem;
      line-height: 1.85;
      color: var(--text);
      white-space: pre-wrap;
      box-shadow: 0 2px 12px rgba(0,0,0,.04);
      min-height: 180px;
    }
    .detail-side {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .detail-action-card {
      background: var(--surface);
      border-radius: 14px;
      border: 1px solid var(--border);
      padding: 18px;
      box-shadow: 0 2px 12px rgba(0,0,0,.04);
    }
    .detail-action-card-title {
      font-size: .72rem;
      font-weight: 700;
      color: var(--text-sub);
      text-transform: uppercase;
      letter-spacing: .8px;
      margin-bottom: 12px;
    }
    .side-like-btn {
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 12px;
      border-radius: 10px;
      border: 1.5px solid var(--border);
      background: var(--surface2);
      font-size: .9rem;
      font-weight: 700;
      cursor: pointer;
      transition: all .2s;
      color: var(--text-sub);
    }
    .side-like-btn.liked {
      border-color: #ef4444;
      background: #fff5f5;
      color: #ef4444;
    }
    .side-like-btn:hover:not(.liked) { border-color: #ef4444; color: #ef4444; }
    .side-like-icon { width: 16px; height: 16px; }
    .side-btn {
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 7px;
      padding: 10px;
      border-radius: 10px;
      border: 1.5px solid var(--border);
      background: var(--surface2);
      font-size: .83rem;
      font-weight: 700;
      cursor: pointer;
      transition: all .18s;
      color: var(--text-sub);
      margin-top: 8px;
    }
    .side-btn svg { width: 14px; height: 14px; }
    .side-btn.edit-btn:hover  { border-color: #6366f1; color: #6366f1; background: #f0f0ff; }
    .side-btn.del-btn:hover   { border-color: #ef4444; color: #ef4444; background: #fff5f5; }
    .side-btn.pin-btn         { border-color: #ede9fe; color: #7c3aed; background: #faf5ff; }
    .side-btn.pin-btn:hover   { background: #ede9fe; }
    .comment-section { margin-top: 24px; }
    .comment-section-header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 16px;
    }
    .comment-section-title {
      font-size: 1rem;
      font-weight: 800;
      color: var(--text);
    }
    .comment-cnt-badge {
      background: #ede9fe;
      color: #7c3aed;
      font-size: .75rem;
      font-weight: 800;
      padding: 2px 10px;
      border-radius: 20px;
    }
    .comment-list { display: flex; flex-direction: column; gap: 10px; margin-bottom: 18px; }
    .comment-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 16px 20px;
      position: relative;
      transition: box-shadow .15s;
    }
    .comment-card:hover { box-shadow: 0 4px 16px rgba(99,102,241,.08); }
    .comment-card-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 8px;
    }
    .comment-card-left { display: flex; align-items: center; gap: 10px; }
    .comment-avatar {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      background: linear-gradient(135deg, #6366f1, #818cf8);
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
      font-size: .8rem;
      font-weight: 800;
      flex-shrink: 0;
    }
    .comment-author { font-size: .85rem; font-weight: 700; color: var(--text); }
    .comment-date   { font-size: .75rem; color: var(--text-sub); }
    .comment-del-btn {
      background: none;
      border: 1px solid var(--border);
      border-radius: 7px;
      padding: 3px 11px;
      font-size: .75rem;
      font-weight: 700;
      color: var(--text-sub);
      cursor: pointer;
      transition: all .18s;
    }
    .comment-del-btn:hover { border-color: #ef4444; color: #ef4444; background: #fff5f5; }
    .comment-content {
      font-size: .88rem;
      color: var(--text);
      line-height: 1.65;
      padding-left: 42px;
    }
    .comment-no {
      text-align: center;
      padding: 36px 0;
      color: var(--text-sub);
      font-size: .875rem;
      background: var(--surface);
      border: 1px dashed var(--border);
      border-radius: 14px;
    }
    .comment-input-wrap {
      background: var(--surface);
      border: 1.5px solid var(--border);
      border-radius: 14px;
      padding: 16px 20px;
      box-shadow: 0 2px 10px rgba(0,0,0,.04);
      transition: border-color .2s;
    }
    .comment-input-wrap:focus-within { border-color: #6366f1; }
    .comment-input-wrap textarea {
      width: 100%;
      border: none;
      outline: none;
      resize: none;
      font-family: inherit;
      font-size: .9rem;
      color: var(--text);
      background: transparent;
      min-height: 64px;
      box-sizing: border-box;
      line-height: 1.6;
    }
    .comment-input-footer {
      display: flex;
      justify-content: flex-end;
      margin-top: 10px;
      padding-top: 10px;
      border-top: 1px solid var(--border);
    }
    .comment-post-btn {
      padding: 8px 22px;
      background: #6366f1;
      color: #fff;
      border: none;
      border-radius: 9px;
      font-size: .85rem;
      font-weight: 700;
      cursor: pointer;
      transition: background .18s;
    }
    .comment-post-btn:hover { background: #4f46e5; }
    .write-page-wrap {
      max-width: 860px;
      margin: 0 auto;
      padding: 40px 24px;
    }
    .write-page-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 28px;
    }
    .write-page-title {
      font-size: 1.35rem;
      font-weight: 800;
      color: var(--text);
    }
    .write-card {
      background: var(--surface);
      border-radius: 18px;
      border: 1px solid var(--border);
      padding: 32px;
      box-shadow: 0 4px 24px rgba(0,0,0,.05);
    }
    .write-label {
      font-size: .78rem;
      font-weight: 700;
      color: var(--text-sub);
      text-transform: uppercase;
      letter-spacing: .8px;
      margin-bottom: 8px;
    }
    .write-title-input {
      width: 100%;
      padding: 14px 18px;
      border-radius: 12px;
      border: 1.5px solid var(--border);
      font-size: 1.05rem;
      font-weight: 600;
      color: var(--text);
      background: var(--surface2);
      font-family: inherit;
      transition: border-color .2s, background .2s;
      box-sizing: border-box;
      margin-bottom: 20px;
    }
    .write-title-input:focus {
      outline: none;
      border-color: #6366f1;
      background: var(--surface);
    }
    .write-content-textarea {
      width: 100%;
      padding: 16px 18px;
      border-radius: 12px;
      border: 1.5px solid var(--border);
      font-size: .95rem;
      color: var(--text);
      background: var(--surface2);
      font-family: inherit;
      resize: vertical;
      min-height: 300px;
      line-height: 1.75;
      transition: border-color .2s, background .2s;
      box-sizing: border-box;
      margin-bottom: 24px;
    }
    .write-content-textarea:focus {
      outline: none;
      border-color: #6366f1;
      background: var(--surface);
    }
    .write-divider {
      height: 1px;
      background: var(--border);
      margin-bottom: 24px;
    }
    .write-footer {
      display: flex;
      justify-content: flex-end;
      gap: 10px;
    }
    .write-cancel-btn {
      padding: 11px 24px;
      border-radius: 11px;
      border: 1.5px solid var(--border);
      background: var(--surface);
      font-size: .875rem;
      font-weight: 700;
      cursor: pointer;
      color: var(--text-sub);
      transition: all .18s;
    }
    .write-cancel-btn:hover { border-color: #6366f1; color: #6366f1; }
    .write-submit-btn {
      padding: 11px 32px;
      border-radius: 11px;
      background: #6366f1;
      color: #fff;
      border: none;
      font-size: .875rem;
      font-weight: 700;
      cursor: pointer;
      transition: background .18s, transform .15s;
    }
    .write-submit-btn:hover { background: #4f46e5; transform: translateY(-1px); }
    .write-submit-btn:disabled { opacity: .6; cursor: not-allowed; transform: none; }
    .admin-panel {
      background: var(--surface);
      border-radius: 18px;
      border: 1px solid var(--border);
      box-shadow: 0 4px 24px rgba(80,70,200,.07);
      overflow: hidden;
      margin-top: 8px;
    }
    .admin-panel-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 18px 24px;
      background: linear-gradient(90deg, #6366f1 0%, #818cf8 100%);
    }
    .admin-panel-title {
      font-size: 1rem;
      font-weight: 800;
      color: #fff;
      letter-spacing: -.2px;
    }
    .admin-panel-sub {
      font-size: .78rem;
      color: rgba(255,255,255,.75);
      margin-top: 2px;
    }
    .admin-panel-goto {
      padding: 7px 16px;
      border-radius: 9px;
      border: 1.5px solid rgba(255,255,255,.4);
      background: rgba(255,255,255,.15);
      color: #fff;
      font-size: .8rem;
      font-weight: 700;
      cursor: pointer;
      transition: background .18s;
      white-space: nowrap;
    }
    .admin-panel-goto:hover { background: rgba(255,255,255,.28); }
    .admin-panel-tabs {
      display: flex;
      border-bottom: 1px solid var(--border);
      background: var(--surface2);
    }
    .admin-panel-tab {
      padding: 11px 22px;
      font-size: .82rem;
      font-weight: 700;
      color: var(--text-sub);
      cursor: pointer;
      border-bottom: 2.5px solid transparent;
      transition: all .18s;
      background: none;
      border-top: none;
      border-left: none;
      border-right: none;
    }
    .admin-panel-tab.active {
      color: #6366f1;
      border-bottom-color: #6366f1;
      background: var(--surface);
    }
    .admin-panel-body { padding: 0; }
    .ap-table { width: 100%; border-collapse: collapse; }
    .ap-table th {
      padding: 11px 20px;
      text-align: left;
      font-size: .72rem;
      font-weight: 700;
      color: var(--text-sub);
      text-transform: uppercase;
      letter-spacing: .7px;
      background: var(--surface2);
      border-bottom: 1px solid var(--border);
    }
    .ap-table td {
      padding: 13px 20px;
      font-size: .86rem;
      border-bottom: 1px solid var(--border);
      color: var(--text);
    }
    .ap-table tr:last-child td { border-bottom: none; }
    .ap-table tr:hover td      { background: #f5f4ff; }
    .ap-role-badge {
      display: inline-block;
      padding: 2px 9px;
      border-radius: 6px;
      font-size: .72rem;
      font-weight: 700;
    }
    .ap-role-admin { background: #ede9fe; color: #7c3aed; }
    .ap-role-user  { background: #e0f2fe; color: #0284c7; }
    .ap-status-badge {
      display: inline-block;
      padding: 2px 9px;
      border-radius: 6px;
      font-size: .72rem;
      font-weight: 700;
    }
    .ap-status-ok      { background: #dcfce7; color: #16a34a; }
    .ap-status-pending { background: #fef3c7; color: #d97706; }
    .ap-btn {
      padding: 4px 12px;
      border-radius: 7px;
      border: none;
      font-size: .75rem;
      font-weight: 700;
      cursor: pointer;
      transition: all .18s;
      margin-right: 4px;
    }
    .ap-btn.approve { background: #dcfce7; color: #16a34a; }
    .ap-btn.approve:hover { background: #16a34a; color: #fff; }
    .ap-btn.delete  { background: #fee2e2; color: #dc2626; }
    .ap-btn.delete:hover  { background: #dc2626; color: #fff; }
    .ap-empty {
      text-align: center;
      padding: 36px 0;
      color: var(--text-sub);
      font-size: .875rem;
    }
    .admin-link-btn {
      padding: 7px 15px;
      border-radius: 9px;
      border: 1.5px solid rgba(255,255,255,.35);
      background: rgba(255,255,255,.15);
      color: #fff;
      font-size: .82rem;
      font-weight: 700;
      cursor: pointer;
      transition: all .18s;
    }
    .admin-link-btn:hover { background: rgba(255,255,255,.28); }

    /* ════════════════════════════════
       게시판 모바일 반응형
    ════════════════════════════════ */
    @media (max-width: 768px) {
      .board-page-wrap { padding: 20px 12px; }
      .board-stats-row { gap: 8px; width: 100%; }
      .board-stat { padding: 10px 0; flex: 1; min-width: 0; }
      .board-stat-num { font-size: 1.1rem; }
      .board-stat-lbl { font-size: .68rem; }
      .write-btn { width: 100%; text-align: center; align-self: stretch; }
      .post-table-head {
        grid-template-columns: 44px 1fr 70px 58px;
        padding: 0 14px;
      }
      .post-table-head span:nth-child(5),
      .post-table-head span:nth-child(6) { display: none; }
      .post-row {
        grid-template-columns: 44px 1fr 70px 58px;
        padding: 0 14px;
      }
      .post-row > *:nth-child(5),
      .post-row > *:nth-child(6) { display: none; }
      .post-row > * { padding: 13px 0; }
      .post-row-title { font-size: .85rem; }
      .post-detail-page { padding: 16px 12px; }
      .detail-hero { padding: 24px 20px; border-radius: 14px; }
      .detail-hero-title { font-size: 1.2rem; }
      .detail-layout { grid-template-columns: 1fr; }
      .detail-side { flex-direction: row; flex-wrap: wrap; gap: 10px; }

        grid-template-columns: 40px 1fr 56px;

      .post-row > *:nth-child(4),
      .post-row > *:nth-child(5),
      .post-row > *:nth-child(6) { display: none; }
      .post-row > *:nth-child(4) { display: block; }
      .board-stat-num { font-size: 1rem; }

<!-- ══════════ SCRIPT ══════════ -->
<script>
const SUBJECTS      = ['국어','영어','수학','역사','과학','정보','한문','도덕'];
const EXAM_SUBJECTS = ['국어','영어','수학','역사','과학','정보'];
const TYPE_LABELS   = { midterm:'중간고사', final:'기말고사', performance:'수행평가', worksheet:'학습지' };
const TYPE_COLORS   = { midterm:'#6366f1', final:'#0ea5e9', performance:'#10b981', worksheet:'#f59e0b' };
const SUBJ_COLORS   = {
  '국어':'#6366f1','영어':'#0ea5e9','수학':'#f59e0b',
  '역사':'#ef4444','과학':'#10b981','정보':'#8b5cf6',
  '한문':'#f97316','도덕':'#ec4899'
};
const ALL_PAGES = ['home','library','board','post-detail','write'];
let allFiles        = [];
let allPosts        = [];
let selectedSubject = '전체';
let selectedType    = '전체';
let currentUser     = null;
let currentPostId   = null;
let editPostId      = null;

async function init() {
  const me = await fetch('/api/me').then(r => r.json());
  if (!me.loggedIn) return (window.location.href = '/login.html');
  currentUser = me.user;
  document.getElementById('header-username').textContent = me.user.name;
  if (me.user.role === 'admin') {
    document.getElementById('admin-link').style.display = '';
    document.getElementById('admin-panel-section').style.display = '';
    loadAdminPanel();
  }
  await loadFiles();
  renderHome();
}
async function loadFiles() {
  allFiles = await fetch('/api/files').then(r => r.json());
}
async function doLogout() {
  await fetch('/api/logout', { method: 'POST' });
  window.location.href = '/login.html';
}
function showPage(page, btn) {
  ALL_PAGES.forEach(p => {
    const el = document.getElementById('page-' + p);
    if (el) el.style.display = p === page ? '' : 'none';
  });
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  if (btn) btn.classList.add('active');
  if (page === 'home')    renderHome();
  if (page === 'library') renderLibrary();
  if (page === 'board')   renderBoardPage();
}

/* ── HOME ── */
function renderHome() {
  const types  = ['midterm','final','performance','worksheet'];
  const labels = ['중간고사','기말고사','수행평가','학습지'];
  document.getElementById('home-stats').innerHTML = [
    `<div class="stat-item">
       <div class="stat-num">${allFiles.length}</div>
       <div class="stat-lbl">전체 자료</div>
     </div>`,
    ...types.map((t, i) =>
      `<div class="stat-item">
         <div class="stat-num">${allFiles.filter(f => f.type === t).length}</div>
         <div class="stat-lbl">${labels[i]}</div>
       </div>`)
  ].join('');
  document.getElementById('home-subject-grid').innerHTML = SUBJECTS.map(s => {
    const cnt = allFiles.filter(f => f.subject === s).length;
    return `<div class="subj-card" onclick="goSubject('${s}')" style="--c:${SUBJ_COLORS[s]}">
      <div class="subj-dot"></div>
      <div class="subj-name">${s}</div>
      <div class="subj-cnt">자료 ${cnt}개</div>
    </div>`;
  }).join('');
  const recent = [...allFiles].slice(0, 4);
  document.getElementById('recent-cards').innerHTML =
    recent.length ? recent.map(f => cardHTML(f)).join('') : emptyHTML();
}
function goSubject(s) {
  selectedSubject = s; selectedType = '전체';
  document.querySelectorAll('.nav-btn').forEach((b, i) => b.classList.toggle('active', i === 1));
  showPage('library', null);
}

/* ── 관리자 패널 ── */
let apAllUsers = [];
async function loadAdminPanel() {
  apAllUsers = await fetch('/api/admin/users').then(r => r.json());
  renderApTab('pending');
}
function switchAdminTab(tab, btn) {
  document.getElementById('ap-tab-pending').style.display = tab === 'pending' ? '' : 'none';
  document.getElementById('ap-tab-all').style.display     = tab === 'all'     ? '' : 'none';
  document.querySelectorAll('.admin-panel-tab').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderApTab(tab);
}
function renderApTab(tab) {
  if (tab === 'pending') renderApPending();
  else                   renderApAll();
}
function renderApPending() {
  const pending = apAllUsers.filter(u => !u.approved && u.role !== 'admin');
  const badge   = document.getElementById('ap-pending-badge');
  badge.textContent  = pending.length ? `(${pending.length})` : '';
  badge.style.color  = '#ef4444';
  badge.style.fontWeight = '800';
  const tbody = document.getElementById('ap-pending-tbody');
  if (!pending.length) {
    tbody.innerHTML = `<tr><td colspan="4" class="ap-empty">승인 대기 중인 회원이 없습니다.</td></tr>`;
    return;
  }
  tbody.innerHTML = pending.map(u => `
    <tr>
      <td style="font-weight:700">${u.name}</td>
      <td style="color:var(--text-sub)">${u.username}</td>
      <td style="color:var(--text-sub)">${u.createdAt?.slice(0,10) || '-'}</td>
      <td>
        <button class="ap-btn approve" onclick="apApprove(${u.id})">승인</button>
        <button class="ap-btn delete"  onclick="apDelete(${u.id})">거절</button>
      </td>
    </tr>`).join('');
}
function renderApAll() {
  const tbody = document.getElementById('ap-all-tbody');
  if (!apAllUsers.length) {
    tbody.innerHTML = `<tr><td colspan="6" class="ap-empty">회원이 없습니다.</td></tr>`;
    return;
  }
  tbody.innerHTML = apAllUsers.map(u => `
    <tr>
      <td style="font-weight:700">${u.name}</td>
      <td style="color:var(--text-sub)">${u.username}</td>
      <td>
        <span class="ap-role-badge ${u.role === 'admin' ? 'ap-role-admin' : 'ap-role-user'}">
          ${u.role === 'admin' ? '관리자' : '일반'}
        </span>
      </td>
      <td>
        <span class="ap-status-badge ${u.approved ? 'ap-status-ok' : 'ap-status-pending'}">
          ${u.approved ? '승인' : '대기'}
        </span>
      </td>
      <td style="color:var(--text-sub)">${u.createdAt?.slice(0,10) || '-'}</td>
      <td>
        ${!u.approved ? `<button class="ap-btn approve" onclick="apApprove(${u.id})">승인</button>` : ''}
        ${u.role !== 'admin' ? `<button class="ap-btn delete" onclick="apDelete(${u.id})">삭제</button>` : ''}
      </td>
    </tr>`).join('');
}
async function apApprove(id) {
  await fetch('/api/admin/users/' + id + '/approve', { method: 'POST' });
  showToast('승인되었습니다.');
  apAllUsers = await fetch('/api/admin/users').then(r => r.json());
  const activeTab = document.getElementById('ap-tab-pending').style.display !== 'none' ? 'pending' : 'all';

/* ── LIBRARY ── */
function renderLibrary() {
  document.getElementById('sidebar-subjects').innerHTML =
    ['전체', ...SUBJECTS].map(s =>
      `<button class="sb-btn${selectedSubject === s ? ' active' : ''}"
               onclick="selectSubject('${s}')">${s}</button>`
    ).join('');
  buildTabs();
  renderCards();
}
function selectSubject(s) { selectedSubject = s; selectedType = '전체'; renderLibrary(); }
function buildTabs() {
  let types = ['전체','수행평가','학습지'];
  if (selectedSubject === '전체' || EXAM_SUBJECTS.includes(selectedSubject))
    types = ['전체','중간고사','기말고사','수행평가','학습지'];
  document.getElementById('cat-tabs').innerHTML = types.map(t =>
    `<button class="cat-tab${selectedType === t ? ' active' : ''}"
             onclick="selectType('${t}')">${t}</button>`
  ).join('');
}
function selectType(t) { selectedType = t; buildTabs(); renderCards(); }
function renderCards() {
  const q    = (document.getElementById('search-input')?.value || '').toLowerCase();
  const tMap = { '중간고사':'midterm','기말고사':'final','수행평가':'performance','학습지':'worksheet','전체':null };
  const tKey = tMap[selectedType];
  const filtered = allFiles.filter(f =>
    (selectedSubject === '전체' || f.subject === selectedSubject) &&
    (!tKey || f.type === tKey) &&
    (!q || f.title.toLowerCase().includes(q))
  );
  document.getElementById('lib-title').textContent =
    (selectedSubject === '전체' ? '' : selectedSubject + ' ') +
    (selectedType === '전체' ? '전체 자료' : selectedType + ' 자료');
  document.getElementById('lib-count').textContent = `${filtered.length}개`;
  document.getElementById('lib-cards').innerHTML =
    filtered.length ? filtered.map(f => cardHTML(f)).join('') : emptyHTML();
}

/* ── CARD ── */
function cardHTML(f) {
  const c   = TYPE_COLORS[f.type]    || '#6366f1';
  const sc  = SUBJ_COLORS[f.subject] || '#6366f1';
  const canDel = currentUser && (currentUser.role === 'admin' || currentUser.id === f.uploadedById);
  return `<div class="card" style="--cc:${c}">
    <div class="card-top">
      <span class="card-type-badge" style="background:${c}20;color:${c}">${TYPE_LABELS[f.type]}</span>
      ${canDel ? `<button class="card-del" onclick="event.stopPropagation();deleteFile(${f.id})">삭제</button>` : ''}
    </div>
    <div class="card-body" onclick="openDetail(${f.id})">
      <div class="card-title">${f.title}</div>
      <div class="card-desc">${f.desc.length > 55 ? f.desc.slice(0,55)+'…' : f.desc || '—'}</div>
    </div>
    <div class="card-foot">
      <span class="card-subj" style="color:${sc}">${f.subject}</span>
      <span class="card-date">${f.createdAt}</span>
    </div>
  </div>`;
}
function emptyHTML() { return `<div class="empty"><p>자료가 없습니다.</p></div>`; }

/* ── DETAIL MODAL ── */
function openDetail(id) {
  const f = allFiles.find(x => x.id === id);
  if (!f) return;
  document.getElementById('detail-title').textContent = f.title;
  document.getElementById('detail-badges').innerHTML  =
    `<span class="d-badge" style="background:${SUBJ_COLORS[f.subject]}20;color:${SUBJ_COLORS[f.subject]}">${f.subject}</span>
     <span class="d-badge" style="background:${TYPE_COLORS[f.type]}20;color:${TYPE_COLORS[f.type]}">${TYPE_LABELS[f.type]}</span>`;

  document.getElementById('detail-meta').textContent =
    `업로드: ${f.uploadedBy}  ·  ${f.createdAt}  ·  ${f.originalName}`;

function downloadFile(id) {
  window.location.href = '/api/download/' + id;
  showToast('다운로드가 시작됩니다.');
}

/* ── DELETE FILE ── */
async function deleteFile(id) {
  if (!confirm('정말 삭제하시겠습니까?')) return;
  const res  = await fetch('/api/files/' + id, { method: 'DELETE' });
  const data = await res.json();
  if (data.success) {
    showToast('삭제되었습니다.');

/* ── UPLOAD ── */
function openUploadModal() { updateTypeOptions(); openModal('uploadModal'); }
function updateTypeOptions() {
  const subj  = document.getElementById('up-subject').value;
  const types = EXAM_SUBJECTS.includes(subj) || subj === ''
    ? [['midterm','중간고사'],['final','기말고사'],['performance','수행평가'],['worksheet','학습지']]
    : [['performance','수행평가'],['worksheet','학습지']];
  document.getElementById('up-type').innerHTML =
    `<option value="">선택</option>` +
    types.map(([v,l]) => `<option value="${v}">${l}</option>`).join('');
}
async function submitUpload() {
  const subject = document.getElementById('up-subject').value;
  const type    = document.getElementById('up-type').value;
  const title   = document.getElementById('up-title').value.trim();
  const desc    = document.getElementById('up-desc').value.trim();
  const file    = document.getElementById('fileInput').files[0];
  if (!subject || !type || !title || !file)
    return showToast('모든 항목을 입력하고 파일을 선택하세요.');
  const fd = new FormData();
  fd.append('subject', subject); fd.append('type', type);
  fd.append('title', title);     fd.append('desc', desc);
  fd.append('file', file);
  const btn = document.querySelector('#uploadModal .btn-submit');
  btn.textContent = '업로드 중...'; btn.disabled = true;
  const res  = await fetch('/api/upload', { method: 'POST', body: fd });
  const data = await res.json();
  btn.textContent = '업로드'; btn.disabled = false;
  if (data.success) {
    closeModal('uploadModal'); resetUploadForm();
    showToast('업로드가 완료되었습니다.');
    await loadFiles();
    if (document.getElementById('page-home').style.display !== 'none') renderHome();
    else renderLibrary();
  } else {
    showToast(data.message);
  }
}
function resetUploadForm() {
  ['up-subject','up-type'].forEach(id => (document.getElementById(id).value = ''));
  ['up-title','up-desc'].forEach(id   => (document.getElementById(id).value = ''));
  document.getElementById('fileInput').value = '';
  document.getElementById('fileLabel').textContent = '파일을 드래그하거나 클릭하여 선택';
  document.getElementById('file-drop').classList.remove('drag');
}
function handleFile(input) {
  if (input.files[0]) document.getElementById('fileLabel').textContent = input.files[0].name;
}
function handleDrop(e) {
  e.preventDefault();
  document.getElementById('file-drop').classList.remove('drag');
  const f = e.dataTransfer.files[0];
  if (f) {
    document.getElementById('fileInput').files = e.dataTransfer.files;
    document.getElementById('fileLabel').textContent = f.name;
  }
}

async function renderBoardPage() {
  allPosts = await fetch('/api/posts').then(r => r.json());
  const totalLikes    = allPosts.reduce((s, p) => s + (p.likes || 0), 0);
  const totalComments = allPosts.reduce((s, p) => s + (p.commentCount || 0), 0);
  document.getElementById('board-stats-row').innerHTML = [
    { num: allPosts.length, lbl: '전체 글' },
    { num: totalLikes,      lbl: '좋아요' },
    { num: totalComments,   lbl: '댓글' },
  ].map(s => `
    <div class="board-stat">
      <div class="board-stat-num">${s.num}</div>
      <div class="board-stat-lbl">${s.lbl}</div>
    </div>`).join('');
  renderPostList();
}
function renderPostList() {
  const q      = (document.getElementById('board-search')?.value || '').toLowerCase();
  const sorted = [...allPosts].sort((a, b) => (b.pinned ? 1 : 0) - (a.pinned ? 1 : 0));
  const filtered = sorted.filter(p =>
    !q || p.title.toLowerCase().includes(q) || p.authorName.toLowerCase().includes(q)
  );
  const body = document.getElementById('post-list-body');
  if (!filtered.length) {
    body.innerHTML = `<div class="post-empty">
      <strong>게시글이 없습니다</strong>
      ${q ? '검색 결과가 없습니다.' : '첫 번째 글을 작성해보세요.'}
    </div>`;
    return;
  }
  let num = filtered.filter(p => !p.pinned).length;
  body.innerHTML = filtered.map(p => {
    const dateStr = new Date(p.createdAt).toLocaleDateString('ko-KR', { month:'2-digit', day:'2-digit' });
    const numCell = p.pinned
      ? `<span class="post-row-pin-label">공지</span>`
      : `<span class="post-row-num">${num--}</span>`;
    return `<div class="post-row" onclick="openPost(${p.id})">
      <div>${numCell}</div>
      <div class="post-row-title-wrap">
        <span class="post-row-title">${escapeHTML(p.title)}</span>
        ${p.commentCount > 0 ? `<span class="post-row-comment-cnt">[${p.commentCount}]</span>` : ''}
      </div>
      <div class="post-row-author">${escapeHTML(p.authorName)}</div>
      <div class="post-row-date">${dateStr}</div>
      <div class="post-row-likes">${p.likes}</div>
      <div class="post-row-views">${p.commentCount}</div>
    </div>`;
  }).join('');
}

async function toggleLike(id) {
  const res  = await fetch('/api/posts/' + id + '/like', { method: 'POST' });
  const data = await res.json();
  if (!data.success) return;
  const btn = document.getElementById('like-btn');
  btn.classList.toggle('liked', data.liked);
  btn.querySelector('svg').setAttribute('fill', data.liked ? 'currentColor' : 'none');
  document.getElementById('like-count').textContent = data.likes;

async function submitComment() {
  const input   = document.getElementById('comment-input');
  const content = input.value.trim();
  if (!content) return showToast('댓글 내용을 입력하세요.');
  const res  = await fetch('/api/posts/' + currentPostId + '/comments', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ content })
  });
  const data = await res.json();
  if (data.success) {
    input.value = '';
    const post = await fetch('/api/posts/' + currentPostId).then(r => r.json());
    renderComments(post.comments || [], currentUser.role === 'admin');
    showToast('댓글이 등록되었습니다.');
  } else {
    showToast(data.message || '오류가 발생했습니다.');
  }
}

  if (!confirm('댓글을 삭제하시겠습니까?')) return;

  const data = await res.json();
  if (data.success) {
    const post = await fetch('/api/posts/' + postId).then(r => r.json());
    renderComments(post.comments || [], currentUser.role === 'admin');

function openModal(id)  { document.getElementById(id).classList.add('show'); }
function closeModal(id) { document.getElementById(id).classList.remove('show'); }
document.querySelectorAll('.modal-overlay').forEach(el => {
  el.addEventListener('click', e => { if (e.target === el) el.classList.remove('show'); });
});
let toastTimer;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 3000);
}
function escapeHTML(str) {
  return String(str)
    .replace(/&/g, '&amp;').replace(/</g, '&lt;')
    .replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}
